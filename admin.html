<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Boat Marketplace</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; background: #eff6ff; font-family: 'DM Sans', sans-serif; color: #1d3c6c; }

  #ocean-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

  /* Nav */
  .nav-bar { display:flex; justify-content:center; gap:10px; padding:1.5rem 1rem 0; position:relative; z-index:10; flex-wrap:wrap; }
  .nav-pill { font-size:12px; font-weight:500; padding:7px 18px; border-radius:20px; border:1px solid rgba(92,145,211,0.3); background:rgba(230,242,255,0.85); color:#2a5080; cursor:pointer; text-decoration:none; letter-spacing:0.04em; transition:all 0.18s; }
  .nav-pill:hover { background:#d6e8ff; border-color:#3b79cf; }
  .nav-pill.active-nav { background:#1e4a7c; color:#fff; border-color:#1e4a7c; }
  .nav-pill.logout { background:rgba(226,75,74,0.08); border-color:rgba(226,75,74,0.3); color:#b83232; }
  .nav-pill.logout:hover { background:rgba(226,75,74,0.15); }

  .page-wrap { width:min(100%,1080px); margin:2rem auto; padding:0 1rem 3rem; position:relative; z-index:2; }

  /* Admin header */

    background: linear-gradient(135deg, #122c51 0%, #1e4a7c 60%, #2a5c96 100%);

    padding: 2rem 2.5rem;
    margin-bottom: 1.8rem;
    color: #fff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(18,44,81,0.2);
  }
  .admin-header::after {
    content: '⚓';
    position: absolute;
    right: 2rem; top: 50%;
    transform: translateY(-50%);
    font-size: 5rem;
    opacity: 0.07;
  }
  .admin-tag {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 3px 12px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #c8e8f4;

  .stat-card {

    border-radius: 16px;

    box-shadow: 0 6px 20px rgba(29,56,104,0.06);

    text-align: center;

  .stat-card .lbl { font-size:11px; color:#7a9ab8; margin-top:2px; }

  .tab-row { display:flex; gap:6px; margin-bottom:1.5rem; border-bottom:1px solid rgba(126,200,227,0.18); }
  .tab-btn { padding:9px 20px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; color:#4a7bb7; background:transparent; border:none; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.18s; }
  .tab-btn.active { color:#122c51; border-bottom-color:#1e4a7c; }
  .tab-btn:hover { color:#122c51; }

  /* Modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(18,44,81,0.4); z-index:100; align-items:center; justify-content:center; padding:1rem; overflow-y:auto; }

    .edit-grid .full { grid-column:1; }
    table { font-size:12px; }
    th, td { padding:10px 10px; }
  }
</style>

<script>
(function(){
  var canvas=document.getElementById('ocean-bg');
  var ctx=canvas.getContext('2d');
  var W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  var t=0;
  function waveY(x,time,amp,freq,speed){return amp*Math.sin(freq*x+speed*time);}
  function drawWaves(){
    [[0.72,14,0.012,1.1,6,0.028,0.7,'rgba(126,185,230,0.22)','rgba(100,160,220,0.12)',0.6],
     [0.78,10,0.018,-0.9,5,0.035,1.3,'rgba(100,165,220,0.18)','rgba(80,145,210,0.10)',0.7],
     [0.84,8,0.022,1.5,4,0.04,-0.6,'rgba(80,155,215,0.20)','rgba(60,130,200,0.10)',0.78]
    ].forEach(function(w){
      ctx.beginPath();ctx.moveTo(0,H);
      for(var x=0;x<=W;x+=4){ctx.lineTo(x,H*w[0]+waveY(x,t,w[1],w[2],w[3])+waveY(x,t,w[4],w[5],w[6]));}
      ctx.lineTo(W,H);ctx.closePath();
      var g=ctx.createLinearGradient(0,H*w[10],0,H);g.addColorStop(0,w[7]);g.addColorStop(1,w[8]);
      ctx.fillStyle=g;ctx.fill();
    });
  }
  function animate(){ctx.clearRect(0,0,W,H);t+=0.018;drawWaves();requestAnimationFrame(animate);}
  animate();
})();
</script>

// Load data
function getData() {
  var sellers = DEMO_SELLERS.slice();
  var buyers = DEMO_BUYERS.slice();
  try {
    var ls = JSON.parse(localStorage.getItem('boatSellerListings') || '[]');
    ls.forEach(function(r,i){ if(!r.id) r.id='ls'+i; sellers.push(r); });
    var lb = JSON.parse(localStorage.getItem('boatBuyerRequests') || '[]');
    lb.forEach(function(r,i){ if(!r.id) r.id='lb'+i; buyers.push(r); });
    // Load any admin edits
    var edits = JSON.parse(localStorage.getItem('adminEdits') || '{}');
    sellers = sellers.map(function(s){ return edits[s.id] ? Object.assign({}, s, edits[s.id]) : s; });
    buyers = buyers.map(function(b){ return edits[b.id] ? Object.assign({}, b, edits[b.id]) : b; });
    // Load deletions
    var dels = JSON.parse(localStorage.getItem('adminDeleted') || '[]');
    sellers = sellers.filter(function(s){ return dels.indexOf(s.id) < 0; });
    buyers = buyers.filter(function(b){ return dels.indexOf(b.id) < 0; });
  } catch(e){}
  return { sellers: sellers, buyers: buyers };
}

var currentTab = 'sellers';
var editingRecord = null;

function updateStats() {
  var d = getData();
  var now = Date.now();
  var newCount = d.sellers.concat(d.buyers).filter(function(r){
    return (now - new Date(r.submittedAt).getTime()) < 86400000*2;
  }).length;
  document.getElementById('st-sellers').textContent = d.sellers.length;
  document.getElementById('st-buyers').textContent = d.buyers.length;
  document.getElementById('st-total').textContent = d.sellers.length + d.buyers.length;
  document.getElementById('st-new').textContent = newCount;
}

function timeSince(iso) {
  var ms = Date.now() - new Date(iso).getTime();
  var days = Math.floor(ms/86400000);
  if (days === 0) return 'Today';
  if (days === 1) return '1d ago';
  return days + 'd ago';
}

function fmt(n) { return n ? '$' + Number(n).toLocaleString() : '—'; }

function showTab(tab) {
  currentTab = tab;
  document.getElementById('tab-s').classList.toggle('active', tab === 'sellers');
  document.getElementById('tab-b').classList.toggle('active', tab === 'buyers');
  renderTable();
}

function renderTable() {
  var d = getData();
  var head = document.getElementById('table-head');
  var body = document.getElementById('table-body');

  if (currentTab === 'sellers') {
    head.innerHTML = '<tr><th>#</th><th>Type</th><th>Boat</th><th>Price</th><th>Location</th><th>Contact</th><th>HP / Hrs</th><th>Listed</th><th>Actions</th></tr>';
    body.innerHTML = '';
    if (d.sellers.length === 0) {
      body.innerHTML = '<tr class="empty-row"><td colspan="9">No seller listings yet.</td></tr>';
      return;
    }
    d.sellers.forEach(function(s, i) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td style="color:#7a9ab8;font-size:11px;">' + (i+1) + '</td>' +
        '<td><span class="pill">' + (s.boatType||'—') + '</span></td>' +
        '<td><strong style="color:#122c51;">' + (s.year||'') + ' ' + (s.make||'') + '</strong><br><span style="font-size:11px;color:#7a9ab8;">' + (s.model||'') + '</span></td>' +
        '<td style="font-weight:500;">' + fmt(s.price) + '</td>' +
        '<td style="font-size:12px;">' + (s.location||'—') + '</td>' +
        '<td style="font-size:12px;">' + (s.contactFirst||'') + ' ' + (s.contactLast||'') + '<br><span style="color:#7a9ab8;">' + (s.contactEmail||'') + '</span></td>' +
        '<td style="font-size:12px;">' + (s.hp ? s.hp+' HP' : '—') + '<br><span style="color:#7a9ab8;">' + (s.engHours ? s.engHours+' hrs' : '') + '</span></td>' +
        '<td style="font-size:11px;color:#7a9ab8;">' + timeSince(s.submittedAt) + '</td>' +
        '<td><div class="action-btns"><button class="btn-edit" onclick="openEdit(\'' + s.id + '\',\'seller\')">Edit</button><button class="btn-delete" onclick="confirmDelete(\'' + s.id + '\',\'seller\',\'' + (s.year+' '+s.make+' '+s.model).replace(/'/g,'') + '\')">Delete</button></div></td>';
      body.appendChild(tr);
    });
  } else {
    head.innerHTML = '<tr><th>#</th><th>Looking For</th><th>Name</th><th>Budget</th><th>Location</th><th>Contact</th><th>Timeline</th><th>Posted</th><th>Actions</th></tr>';
    body.innerHTML = '';
    if (d.buyers.length === 0) {
      body.innerHTML = '<tr class="empty-row"><td colspan="9">No buyer requests yet.</td></tr>';
      return;
    }
    d.buyers.forEach(function(b, i) {
      var types = (b.boatTypes||[]).join(', ') || '—';
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td style="color:#7a9ab8;font-size:11px;">' + (i+1) + '</td>' +
        '<td><span class="pill buyer">' + types + '</span></td>' +
        '<td><strong style="color:#122c51;">' + (b.firstName||'') + ' ' + (b.lastName||'') + '</strong><br><span style="font-size:11px;color:#7a9ab8;">' + (b.primaryUse||'') + '</span></td>' +
        '<td style="font-size:12px;">' + ((b.priceMin||b.priceMax) ? fmt(b.priceMin)+' – '+fmt(b.priceMax) : 'Flexible') + '</td>' +
        '<td style="font-size:12px;">' + (b.location||'—') + '</td>' +
        '<td style="font-size:12px;">' + (b.email||'—') + '<br><span style="color:#7a9ab8;">' + (b.phone||'') + '</span></td>' +
        '<td style="font-size:12px;">' + (b.timeline||'—') + '</td>' +
        '<td style="font-size:11px;color:#7a9ab8;">' + timeSince(b.submittedAt) + '</td>' +
        '<td><div class="action-btns"><button class="btn-edit" onclick="openEdit(\'' + b.id + '\',\'buyer\')">Edit</button><button class="btn-delete" onclick="confirmDelete(\'' + b.id + '\',\'buyer\',\'' + (b.firstName+' '+b.lastName).replace(/'/g,'') + '\')">Delete</button></div></td>';
      body.appendChild(tr);
    });
  }
}

function openEdit(id, type) {
  var d = getData();
  var list = type === 'seller' ? d.sellers : d.buyers;
  var rec = list.find(function(r){ return r.id === id; });
  if (!rec) return;
  editingRecord = { id: id, type: type };

  document.getElementById('modal-title').textContent = type === 'seller'
    ? 'Edit Seller Listing — ' + (rec.year||'') + ' ' + (rec.make||'') + ' ' + (rec.model||'')
    : 'Edit Buyer Request — ' + (rec.firstName||'') + ' ' + (rec.lastName||'');

  var f = document.getElementById('modal-form');

  if (type === 'seller') {
    f.innerHTML =
      '<div class="edit-grid">' +
      field('boatType','Boat Type',rec.boatType,'text') +
      field('make','Make / Brand',rec.make,'text') +
      field('model','Model',rec.model,'text') +
      field('year','Year',rec.year,'number') +
      field('length','Length (ft)',rec.length,'number') +
      field('beam','Beam (ft)',rec.beam,'number') +
      field('hull','Hull Material',rec.hull,'text') +
      field('hp','Horsepower',rec.hp,'number') +
      field('engHours','Engine Hours',rec.engHours,'number') +
      field('engBrand','Engine Brand',rec.engBrand,'text') +
      field('price','Asking Price ($)',rec.price,'number') +
      field('location','Location',rec.location,'text') +
      field('contactFirst','First Name',rec.contactFirst,'text') +
      field('contactLast','Last Name',rec.contactLast,'text') +
      field('contactEmail','Email',rec.contactEmail,'text') +
      field('contactPhone','Phone',rec.contactPhone,'text') +
      '<div class="field-group full"><label class="fl">Seller Notes</label><textarea id="ef-notes" rows="3">' + esc(rec.notes||'') + '</textarea></div>' +
      '</div>';
  } else {
    f.innerHTML =
      '<div class="edit-grid">' +
      field('firstName','First Name',rec.firstName,'text') +
      field('lastName','Last Name',rec.lastName,'text') +
      field('email','Email',rec.email,'text') +
      field('phone','Phone',rec.phone,'text') +
      field('location','Location',rec.location,'text') +
      field('priceMin','Budget Min ($)',rec.priceMin,'number') +
      field('priceMax','Budget Max ($)',rec.priceMax,'number') +
      field('lenMin','Min Length (ft)',rec.lenMin,'number') +
      field('lenMax','Max Length (ft)',rec.lenMax,'number') +
      field('yrMin','Earliest Year',rec.yrMin,'number') +
      field('yrMax','Latest Year',rec.yrMax,'number') +
      field('hpMin','Min HP',rec.hpMin,'number') +
      field('hrsMax','Max Engine Hours',rec.hrsMax,'number') +
      field('timeline','Timeline',rec.timeline,'text') +
      field('primaryUse','Primary Use',rec.primaryUse,'text') +
      field('finance','Financing',rec.finance,'text') +
      '<div class="field-group full"><label class="fl">Notes</label><textarea id="ef-notes" rows="3">' + esc(rec.notes||'') + '</textarea></div>' +
      '</div>';
  }

  document.getElementById('modal-overlay').classList.add('open');
}

function field(id, label, val, type) {
  return '<div class="field-group"><label class="fl">' + label + '</label><input type="' + type + '" id="ef-' + id + '" value="' + esc(val||'') + '"></div>';
}

function esc(s) { return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function saveEdit() {
  if (!editingRecord) return;
  var id = editingRecord.id;
  var type = editingRecord.type;

  var updates = {};
  var fields = type === 'seller'
    ? ['boatType','make','model','year','length','beam','hull','hp','engHours','engBrand','price','location','contactFirst','contactLast','contactEmail','contactPhone']
    : ['firstName','lastName','email','phone','location','priceMin','priceMax','lenMin','lenMax','yrMin','yrMax','hpMin','hrsMax','timeline','primaryUse','finance'];

  fields.forEach(function(f) {
    var el = document.getElementById('ef-' + f);
    if (el) updates[f] = el.value;
  });
  var notesEl = document.getElementById('ef-notes');
  if (notesEl) updates.notes = notesEl.value;

  try {
    var edits = JSON.parse(localStorage.getItem('adminEdits') || '{}');
    edits[id] = Object.assign(edits[id] || {}, updates);
    localStorage.setItem('adminEdits', JSON.stringify(edits));
  } catch(e) {}

  closeModal();
  renderTable();
  updateStats();
  showToast('✓ Changes saved');
}

function confirmDelete(id, type, name) {
  document.getElementById('del-desc').textContent = 'Delete "' + name + '"? This cannot be undone.';
  var btn = document.getElementById('del-confirm-btn');
  btn.onclick = function() { doDelete(id); };
  document.getElementById('del-overlay').classList.add('open');
}

function doDelete(id) {
  try {
    var dels = JSON.parse(localStorage.getItem('adminDeleted') || '[]');
    if (dels.indexOf(id) < 0) dels.push(id);
    localStorage.setItem('adminDeleted', JSON.stringify(dels));
  } catch(e) {}
  document.getElementById('del-overlay').classList.remove('open');
  renderTable();
  updateStats();
  showToast('🗑 Record deleted');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingRecord = null;
}

function overlayClick(e) {
  if (e.target === e.currentTarget) {
    e.currentTarget.classList.remove('open');
    editingRecord = null;
  }
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function logout() {
  try { localStorage.removeItem('boatMarketRole'); localStorage.removeItem('boatMarketAuth'); } catch(e){}
  window.location.href = 'login.html';
}

// Init
updateStats();
renderTable();
</script>
</body>
</html>
