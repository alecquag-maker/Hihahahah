<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boat Marketplace — Sign In</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; background: #eff6ff; font-family: 'DM Sans', sans-serif; color: #1d3c6c; }

  /* ── Ocean canvas background ── */
  #ocean-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

  /* ── Centered card ── */
  .login-wrap {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .login-card {
    width: min(100%, 420px);
    background: linear-gradient(180deg, #f9fbff 0%, #eef5ff 100%);
    border-radius: 28px;
    border: 1px solid rgba(94,146,215,0.2);
    box-shadow: 0 30px 80px rgba(29,56,104,0.12);
    padding: 2.8rem 2.5rem 2.5rem;
    position: relative;
    overflow: hidden;
  }

  /* Subtle wave decoration at bottom of card */
  .card-wave {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    overflow: hidden;
    opacity: 0.06;
    pointer-events: none;
  }
  .card-wave-line {
    position: absolute;
    width: 200%; height: 40px;
    border-radius: 50%;
    border: 1.5px solid #7ec8e3;
  }
  .cw1 { bottom: 8px; left: -50%; animation: drift 8s linear infinite; }
  .cw2 { bottom: 22px; left: -30%; animation: drift 12s linear infinite reverse; }
  @keyframes drift { from { transform: translateX(0); } to { transform: translateX(25%); } }

  /* Stars in card */
  .star-field { position: absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:0; }
  .star { position: absolute; background: rgba(88,138,219,0.65); border-radius: 50%; animation: twinkle 3s infinite alternate; }
  @keyframes twinkle { from { opacity:0.08; } to { opacity:0.45; } }

  .card-inner { position: relative; z-index: 1; }

  /* Logo / brand mark */
  .brand-mark {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 2rem;
  }
  .brand-icon {
    width: 40px; height: 40px;
    background: rgba(59,121,207,0.12);
    border: 1px solid rgba(59,121,207,0.22);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .brand-icon svg { width: 22px; height: 22px; }
  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: #122c51;
    line-height: 1.2;
  }
  .brand-sub { font-size: 11px; color: #7a9ab8; letter-spacing: 0.06em; text-transform: uppercase; }

  h2.login-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.65rem;
    font-weight: 600;
    color: #122c51;
    margin-bottom: 0.4rem;
    line-height: 1.2;
  }
  h2.login-title span { color: #3b79cf; }

  .login-sub {
    font-size: 13px;
    color: #5b738f;
    margin-bottom: 2rem;
    line-height: 1.5;
  }

  /* Role selector */
  .role-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .role-card {
    border: 1.5px solid rgba(92,145,211,0.25);
    border-radius: 14px;
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(240,247,255,0.5);
    text-align: center;
    user-select: none;
  }
  .role-card:hover { border-color: rgba(59,121,207,0.45); background: rgba(230,242,255,0.8); }
  .role-card.selected {
    border-color: #3b79cf;
    background: rgba(59,121,207,0.08);
    box-shadow: 0 0 0 3px rgba(59,121,207,0.1);
  }
  .role-card.admin-card.selected {
    border-color: #2a5c96;
    background: rgba(29,60,108,0.08);
    box-shadow: 0 0 0 3px rgba(29,60,108,0.1);
  }
  .role-icon {
    font-size: 1.5rem;
    margin-bottom: 6px;
    display: block;
  }
  .role-label {
    font-size: 13px;
    font-weight: 500;
    color: #1f3b68;
    display: block;
    margin-bottom: 2px;
  }
  .role-desc {
    font-size: 11px;
    color: #7a9ab8;
    display: block;
    line-height: 1.4;
  }

  /* Form fields */
  .field-group { margin-bottom: 1rem; }
  label.fl {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: #415b7d;
    margin-bottom: 5px;
    letter-spacing: 0.04em;
  }
  .input-wrap { position: relative; }
  input[type=text], input[type=password] {
    width: 100%;
    background: #f6f9ff;
    border: 1px solid rgba(92,145,211,0.35);
    border-radius: 10px;
    padding: 11px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: #1f3b68;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  input::placeholder { color: rgba(76,106,145,0.45); }
  input:focus { border-color: rgba(92,145,211,0.7); background: #eef4ff; }

  .show-pw {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer; color: #7a9ab8;
    font-size: 13px; padding: 0;
    transition: color 0.15s;
  }
  .show-pw:hover { color: #3b79cf; }

  /* Error */
  .error-msg {
    display: none;
    background: rgba(226,75,74,0.08);
    border: 1px solid rgba(226,75,74,0.25);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: #b83232;
    margin-bottom: 1rem;
    animation: shake 0.35s ease;
  }
  .error-msg.show { display: block; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* Submit button */
  .btn-login {
    width: 100%;
    background: #3b79cf;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    letter-spacing: 0.02em;
    margin-top: 0.5rem;
    box-shadow: 0 4px 16px rgba(59,121,207,0.25);
  }
  .btn-login:hover { background: #2a68be; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(59,121,207,0.3); }
  .btn-login:active { transform: scale(0.98); }

  .btn-login.admin-btn { background: #1e4a7c; box-shadow: 0 4px 16px rgba(29,60,108,0.25); }
  .btn-login.admin-btn:hover { background: #163d6a; box-shadow: 0 8px 24px rgba(29,60,108,0.3); }

  .divider-line {
    height: 1px;
    background: rgba(126,200,227,0.18);
    margin: 1.5rem 0;
  }

  .guest-link {
    text-align: center;
    font-size: 12px;
    color: #7a9ab8;
  }
  .guest-link a { color: #3b79cf; text-decoration: none; font-weight: 500; }
  .guest-link a:hover { text-decoration: underline; }

  /* Success flash */
  .success-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(18,44,81,0.4);
    z-index: 50;
    align-items: center;
    justify-content: center;
  }
  .success-overlay.show { display: flex; }
  .success-box {
    background: #fff;
    border-radius: 20px;
    padding: 2.5rem 2rem;
    text-align: center;
    max-width: 320px;
    box-shadow: 0 24px 60px rgba(18,44,81,0.18);
    animation: popIn 0.3s ease forwards;
  }
  @keyframes popIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
  .success-icon {
    width: 56px; height: 56px;
    background: rgba(16,185,129,0.1);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem;
  }
  .success-icon svg { width: 28px; height: 28px; stroke: #10b981; fill: none; }
  .success-box h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: #122c51; margin-bottom: 0.4rem; }
  .success-box p { font-size: 13px; color: #5b738f; line-height: 1.5; }

  /* Admin badge on nav */
  .admin-badge {
    display: inline-block;
    background: rgba(29,60,108,0.12);
    border: 1px solid rgba(29,60,108,0.2);
    color: #1e4a7c;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 8px;
    margin-left: 6px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<canvas id="ocean-bg"></canvas>

<script>
(function(){
  var canvas=document.getElementById('ocean-bg');
  var ctx=canvas.getContext('2d');
  var W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  var t=0;
  function waveY(x,time,amp,freq,speed){return amp*Math.sin(freq*x+speed*time);}
  function drawWaves(){
    var layers=[
      [0.72,14,0.012,1.1,6,0.028,0.7,'rgba(126,185,230,0.22)','rgba(100,160,220,0.12)',0.6],
      [0.78,10,0.018,-0.9,5,0.035,1.3,'rgba(100,165,220,0.18)','rgba(80,145,210,0.10)',0.7],
      [0.84,8,0.022,1.5,4,0.04,-0.6,'rgba(80,155,215,0.20)','rgba(60,130,200,0.10)',0.78]
    ];
    layers.forEach(function(w){
      ctx.beginPath();ctx.moveTo(0,H);
      for(var x=0;x<=W;x+=4){ctx.lineTo(x,H*w[0]+waveY(x,t,w[1],w[2],w[3])+waveY(x,t,w[4],w[5],w[6]));}
      ctx.lineTo(W,H);ctx.closePath();
      var g=ctx.createLinearGradient(0,H*w[10],0,H);
      g.addColorStop(0,w[7]);g.addColorStop(1,w[8]);
      ctx.fillStyle=g;ctx.fill();
    });
    // Foam crests
    ctx.strokeStyle='rgba(200,230,255,0.3)';ctx.lineWidth=1.5;
    for(var xi=0;xi<W;xi+=80){
      var by2=H*0.84+waveY(xi,t,8,0.022,1.5);
      ctx.beginPath();ctx.arc(xi+30,by2-2,12,Math.PI,0,false);ctx.stroke();
    }
    // Seagulls
    var birds=[{ox:W*0.15,oy:H*0.18,r:32,ph:0},{ox:W*0.82,oy:H*0.22,r:20,ph:1.8},{ox:W*0.55,oy:H*0.12,r:45,ph:3.2}];
    birds.forEach(function(b){
      var bx=b.ox+b.r*Math.cos(t*0.3+b.ph);
      var by3=b.oy+8*Math.sin(t*0.7+b.ph);
      var wing=Math.sin(t*3+b.ph)*4;
      ctx.beginPath();ctx.moveTo(bx-10,by3);ctx.quadraticCurveTo(bx-5,by3-wing-3,bx,by3);ctx.quadraticCurveTo(bx+5,by3-wing-3,bx+10,by3);
      ctx.strokeStyle='rgba(80,130,180,0.3)';ctx.lineWidth=1.5;ctx.stroke();
    });
  }
  function animate(){ctx.clearRect(0,0,W,H);t+=0.018;drawWaves();requestAnimationFrame(animate);}
  animate();
})();
</script>

<div class="login-wrap">
  <div class="login-card">
    <!-- Wave decorations -->
    <div class="card-wave">
      <div class="card-wave-line cw1"></div>
      <div class="card-wave-line cw2"></div>
    </div>
    <!-- Stars -->
    <div class="star-field" id="stars"></div>

    <div class="card-inner">
      <!-- Brand -->
      <div class="brand-mark">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#3b79cf" stroke-width="1.5">
            <path d="M3 17h18M6 17l-2-6h16l-2 6"/>
            <path d="M12 4v7M9 7l3-3 3 3"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">Boat Marketplace</div>
          <div class="brand-sub">Member Portal</div>
        </div>
      </div>

      <h2 class="login-title">Welcome <span>aboard.</span></h2>
      <p class="login-sub">Sign in to access listings, buyer requests, and your dashboard.</p>

      <!-- Role Selector -->
      <div class="role-row">
        <div class="role-card selected" id="role-public" onclick="selectRole('public')">
          <span class="role-icon">🧭</span>
          <span class="role-label">Public</span>
          <span class="role-desc">Browse & submit listings</span>
        </div>
        <div class="role-card admin-card" id="role-admin" onclick="selectRole('admin')">
          <span class="role-icon">⚓</span>
          <span class="role-label">Admin</span>
          <span class="role-desc">Manage & edit all listings</span>
        </div>
      </div>

      <!-- Error -->
      <div class="error-msg" id="error-msg">
        <strong>Incorrect password.</strong> Please try again.
      </div>

      <!-- Password field -->
      <div class="field-group">
        <label class="fl" id="pw-label">Password</label>
        <div class="input-wrap">
          <input type="password" id="pw-input" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()">
          <button class="show-pw" onclick="togglePw()" id="show-pw-btn" title="Show/hide password">👁</button>
        </div>
      </div>

      <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In</button>

      <div class="divider-line"></div>

      <p class="guest-link">
        Don't have an account? &nbsp;<a href="listings.html">Browse as guest →</a>
      </p>
    </div>
  </div>
</div>

<!-- Success overlay -->
<div class="success-overlay" id="success-overlay">
  <div class="success-box">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h3 id="success-title">Signed in!</h3>
    <p id="success-msg">Redirecting you now...</p>
  </div>
</div>

<script>
var currentRole = 'public';

// Passwords
var PASSWORDS = { public: '1', admin: '2' };

function selectRole(role) {
  currentRole = role;
  document.getElementById('role-public').classList.toggle('selected', role === 'public');
  document.getElementById('role-admin').classList.toggle('selected', role === 'admin');
  // Clear error and password on role switch
  document.getElementById('pw-input').value = '';
  document.getElementById('error-msg').classList.remove('show');
  // Update button style
  var btn = document.getElementById('login-btn');
  btn.className = 'btn-login' + (role === 'admin' ? ' admin-btn' : '');
  btn.textContent = role === 'admin' ? '⚓ Sign In as Admin' : 'Sign In';
  document.getElementById('pw-label').textContent = role === 'admin' ? 'Admin Password' : 'Password';
  document.getElementById('pw-input').placeholder = role === 'admin' ? 'Enter admin password' : 'Enter your password';
}

function togglePw() {
  var inp = document.getElementById('pw-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function doLogin() {
  var pw = document.getElementById('pw-input').value;
  var err = document.getElementById('error-msg');
  err.classList.remove('show');

  if (pw === PASSWORDS[currentRole]) {
    // Save session to localStorage
    try {
      localStorage.setItem('boatMarketRole', currentRole);
      localStorage.setItem('boatMarketAuth', 'true');
    } catch(e) {}

    // Show success
    var overlay = document.getElementById('success-overlay');
    document.getElementById('success-title').textContent = currentRole === 'admin' ? '⚓ Admin Access Granted' : '🧭 Signed In!';
    document.getElementById('success-msg').textContent = currentRole === 'admin' ? 'Redirecting to admin panel...' : 'Taking you to the listings...';
    overlay.classList.add('show');

    setTimeout(function() {
      window.location.href = currentRole === 'admin' ? 'admin.html' : 'listings.html';
    }, 1400);
  } else {
    err.classList.add('show');
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
    // Re-trigger shake animation
    err.style.animation = 'none';
    err.offsetHeight;
    err.style.animation = 'shake 0.35s ease';
  }
}

// Stars
var sf = document.getElementById('stars');
for(var i=0;i<18;i++){
  var s=document.createElement('div');
  s.className='star';
  var sz=(Math.random()*1.6+0.4).toFixed(1);
  s.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;animation-delay:'+Math.random()*4+'s;animation-duration:'+(2+Math.random()*4)+'s;';
  sf.appendChild(s);
}
</script>
</body>
</html>
